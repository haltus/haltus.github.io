<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>WhatsApp-подобный чат + сценарий (реалистичные задержки)</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
      gap: 20px;
    }
    .container {
      flex: 1;
      max-width: 400px;
      height: 700px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      cursor: pointer;
    }
    .header {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      background-color: #00a884;
      color: white;
      font-size: 16px;
      font-weight: 500;
    }
    .header-icon {
      width: 30px;
      height: 30px;
      background-color: #005c4b;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 8px;
      font-size: 14px;
    }
    .header-title {
      font-weight: 500;
    }
    .header-subtitle {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 1px;
    }

    .chat {
      flex: 1;
      padding: 10px 14px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;

      /* скрыть полосу прокрутки */
      scrollbar-width: none;
      -ms-overflow-style: none;
      scroll-behavior: smooth; /* плавная прокрутка */
    }
    .chat::-webkit-scrollbar {
      display: none;
    }
    .chat::-webkit-scrollbar {
      display: none;
    }

.system-message {
  text-align: center;
  font-size: 12px;
  color: #54656f;
  margin: 2px 0;   /* было 10px → 2px */
  padding: 0;
}

    .message {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      max-width: 75%;
      margin-bottom: 3px;
      opacity: 0;
      transform: translateY(20px);
      animation: messageAppear 0.35s ease-out forwards;
    }
    .message.own {
      margin-left: auto;
      align-items: flex-end;
    }

    @keyframes messageAppear {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-info {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #54656f;
      margin-bottom: 2px;
    }
    .message-name {
      font-weight: 500;
    }
    .message-time {
      font-size: 11px;
      color: #8696a0;
    }

    .message-content {
      padding: 8px 12px;
      border-radius: 15px;
      font-size: 14px;
      line-height: 1.4;
    }
    .message.incoming .message-content {
      background-color: #f0f0f0;
      color: #000000;
      border-top-left-radius: 0;
    }
    .message.own .message-content {
      background-color: #00a884;
      color: #ffffff;
      border-top-right-radius: 0;
    }

    .input-area {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background-color: #f0f2f5;
      border-top: 1px solid #e3e3e3;
    }
    .input-area button {
      background: none;
      border: none;
      color: #54656f;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
    }
    .input-area button:hover {
      color: #00a884;
    }
    .input-area input {
      flex: 1;
      height: 36px;
      padding: 0 10px;
      border-radius: 18px;
      border: 1px solid #ddd;
      outline: none;
      font-size: 14px;
      background-color: white;
    }

    .typing-indicator {
      margin-top: 4px;
      padding: 4px 10px;
      background-color: #f0f0f0;
      border-radius: 16px;
      font-size: 12px;
      color: #54656f;
      align-self: flex-start;
      display: inline-block;
    }

    .typing-dots span {
      opacity: 0;
      animation: blink 1.4s infinite both;
    }

    .typing-dots span:nth-child(1) { animation-delay: 0s; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 20% { opacity: 0; }
      100% { opacity: 1; }
    }

    .script-area {
      flex: 1;
      max-width: 350px;
      height: 700px;
      background: #f8f9fa;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .script-header {
      padding: 10px 12px;
      background-color: #f0f2f5;
      font-size: 14px;
      font-weight: 500;
      border-bottom: 1px solid #e0e0e0;
    }
    .script-content {
      flex: 1;
      padding: 10px;
      resize: none;
      font-family: Consolas, monospace;
      font-size: 13px;
      line-height: 1.4;
      border: none;
      background: #ffffff;
      outline: none;
    }
    .script-controls {
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      background-color: #f0f2f5;
      border-top: 1px solid #e0e0e0;
    }
    .script-controls button {
      padding: 5px 10px;
      font-size: 12px;
      border-radius: 6px;
      border: none;
      background-color: #00a884;
      color: white;
      cursor: pointer;
    }
    .script-controls button:hover {
      background-color: #008c70;
    }
    .script-controls button.restart {
      background-color: #ff6b6b;
    }
    .script-controls button.restart:hover {
      background-color: #e64949;
    }
    .script-controls button.clear {
      background-color: #adb5bd;
    }
    .script-controls button.clear:hover {
      background-color: #90a4ae;
    }
  </style>
</head>
<body>
  <!-- Левая часть — чат -->
  <div class="container" id="mainContainer">
    <div class="header">
      <div class="header-icon">💬</div>
      <div>
        <div class="header-title">Выпускной 1579</div>
        <div class="header-subtitle">13 участников</div>
      </div>
    </div>

    <div class="chat" id="chat">
      <!-- Сообщения будут добавляться сюда -->
    </div>

    <div class="input-area">
      <input type="text" placeholder="Сообщение" id="messageInput" />
      <button id="sendBtn">➤</button>
    </div>
  </div>

  <!-- Правая часть — сценарий сообщений -->
  <div class="script-area">
    <div class="script-header">Сценарий сообщений (Имя: Текст)</div>
    <textarea id="scenarioInput" class="script-content">

    </textarea>
    <div class="script-controls">
      <button id="runBtn">► Запустить</button>
      <button id="restartBtn" class="restart">⟳ Перезапустить</button>
      <button id="clearBtn" class="clear">× Очистить чат</button>
    </div>
  </div>

  <!-- Два звука -->
  <audio id="userSound" preload="auto"></audio>
  <audio id="systemSound" preload="auto"></audio>

  <script>
    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    const scenarioInput = document.getElementById("scenarioInput");
    const runBtn = document.getElementById("runBtn");
    const restartBtn = document.getElementById("restartBtn");
    const clearBtn = document.getElementById("clearBtn");

    const userSoundEl = document.getElementById("userSound");
    const systemSoundEl = document.getElementById("systemSound");

    const mainContainer = document.getElementById("mainContainer");

    let userInteractionDone = false;

    function initSounds() {
      if (userInteractionDone) return;
      userInteractionDone = true;

      // Примеры локальных звуков (поменяй на свои файлы при необходимости)
      userSoundEl.src = "message_user.mp3";     // звук обычного сообщения
      systemSoundEl.src = "message_system.mp3"; // звук системного сообщения
    }

    function playUserSound() {
      if (!userSoundEl.src) return;
      userSoundEl.currentTime = 0;
      userSoundEl.play().catch(() => {});
    }
    function playSystemSound() {
      if (!systemSoundEl.src) return;
      systemSoundEl.currentTime = 0;
      systemSoundEl.play().catch(() => {});
    }

    // Список участников
    const members = [
      { id: 1, name: "Анна", isYou: false },
      { id: 2, name: "Артём", isYou: false },
      { id: 3, name: "Мама Аркадия", isYou: true },
      { id: 4, name: "Иван", isYou: false },
      { id: 5, name: "Елена", isYou: false },
    ];

    const you = members.find(m => m.isYou);

    function now() {
      const pad = n => (n < 10 ? "0" : "") + n;
      const d = new Date();
      return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function scrollToBottom() {
      chatEl.scrollTo({
        top: chatEl.scrollHeight,
        behavior: "smooth"
      });
    }

    function clearChat() {
      chatEl.innerHTML = "";
      scrollToBottom();
    }

    function appendMessage(name, text, isOwn = false, type = "regular") {
      const msgDiv = document.createElement("div");
      msgDiv.className = `message ${isOwn ? "own" : "incoming"}`;

      if (type === "system") {
        const sysDiv = document.createElement("div");
        sysDiv.className = "system-message";
        sysDiv.textContent = text;
        chatEl.appendChild(sysDiv);
        scrollToBottom();
        if (userInteractionDone) playSystemSound();
        return;
      }

      const info = document.createElement("div");
      info.className = "message-info";

      const nameSpan = document.createElement("span");
      nameSpan.className = "message-name";
      nameSpan.textContent = name;

      info.appendChild(nameSpan);

      const time = document.createElement("span");
      time.className = "message-time";
      time.textContent = now();

      info.appendChild(time);

      const content = document.createElement("div");
      content.className = "message-content";
      content.textContent = text;

      msgDiv.appendChild(info);
      msgDiv.appendChild(content);

      chatEl.appendChild(msgDiv);
      scrollToBottom();
      if (userInteractionDone) playUserSound();
    }

    function delayFromLength(text, isSystem = false) {
      const baseDelay = isSystem ? 300 : 800;  // системные быстрее
      const coef = isSystem ? 0.1 : 0.3;       // чем дольше текст — тем больше пауза
      const delay = baseDelay + text.length * coef * 100;
      return Math.min(delay, 4000); // max 4 сек, чтобы не залипать
    }

function startScenario() {
  clearChat();
  const lines = scenarioInput.value.trim().split(/\r?\n/).filter(line => line.trim() !== "");
  let index = 0;
  const typingMap = new Map();

  function removeTyping(user) {
    const typingKey = "typing_" + user;
    const el = typingMap.get(typingKey);
    if (el && el.parentNode) {
      el.parentNode.removeChild(el);
      typingMap.delete(typingKey);
    }
  }

  function addTyping(user) {
    removeTyping(user);

    const msgDiv = document.createElement("div");
    msgDiv.className = "message typing incoming";

    const info = document.createElement("div");
    info.className = "message-info";

    const nameSpan = document.createElement("span");
    nameSpan.className = "message-name";
    nameSpan.textContent = user;

    info.appendChild(nameSpan);

    const time = document.createElement("span");
    time.className = "message-time";
    time.textContent = now();

    info.appendChild(time);

    const content = document.createElement("div");
    content.className = "typing-indicator";

    const textSpan = document.createElement("span");
    textSpan.textContent = " печатает";
    content.appendChild(textSpan);

    const dots = document.createElement("span");
    dots.className = "typing-dots";
    dots.innerHTML = '<span>.</span><span>.</span><span>.</span>';
    content.appendChild(dots);

    msgDiv.appendChild(info);
    msgDiv.appendChild(content);

    chatEl.appendChild(msgDiv);
    typingMap.set("typing_" + user, msgDiv);
    scrollToBottom();
  }

  function processNextLine() {
    if (index >= lines.length) return;

    const line = lines[index].trim();

    // Формат: DELAY|ТЕКСТ
    const pipePos = line.indexOf("|");
    if (pipePos === -1) {
      // Нет задержки → дефолтная пауза до этого сообщения
      index++;
      setTimeout(processNextLine, 500);
      return;
    }

    const delayStr = line.slice(0, pipePos).trim();
    const content = line.slice(pipePos + 1).trim();

    const delay = parseInt(delayStr, 10) || 500;

    // 1. Сначала ждём задержку, относящуюся к *этому* сообщению
    setTimeout(() => {
      const firstColon = content.indexOf(":");
      if (firstColon === -1) {
        index++;
        processNextLine();
        return;
      }

      const prefix = content.slice(0, firstColon).trim();
      const text = content.slice(firstColon + 1).trim();

      if (prefix === "СИСТЕМА") {
        appendMessage(null, text, false, "system");
        index++;
        processNextLine(); // дальше без задержки (пауза уже была в таймере)

      } else if (prefix === "ПЕЧАТЬ") {
        addTyping(text);
        index++;
        setTimeout(() => {
          removeTyping(text);
          processNextLine();
        }, 1000 + Math.random() * 3000); // длительность самого индикатора

      } else {
        const sender = members.find(m => m.name === prefix);
        const isOwn = sender && sender.isYou;

        appendMessage(prefix, text, isOwn, "regular");
        index++;
        processNextLine();
      }
    }, delay);
  }
  processNextLine();
}

    runBtn.addEventListener("click", () => {
      initSounds();
      startScenario();
    });
    restartBtn.addEventListener("click", () => {
      initSounds();
      startScenario();
    });
    clearBtn.addEventListener("click", clearChat);

    mainContainer.addEventListener("click", () => {
      initSounds();
    });
    mainContainer.addEventListener("touchstart", () => {
      initSounds();
    });
    mainContainer.addEventListener("mousedown", () => {
      initSounds();
    });

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      initSounds();
      appendMessage(you.name, text, true);
      inputEl.value = "";
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    scrollToBottom();
  </script>
</body>
</html>
